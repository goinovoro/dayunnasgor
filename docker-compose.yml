version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_USER: postgres
      POSTGRES_DB: dayunnasgor
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  # POS App
  pos:
    build:
      context: .
      dockerfile: apps/pos/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/dayunnasgor
    depends_on:
      - db

  # KDS App
  kds:
    build:
      context: .
      dockerfile: apps/kds/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/dayunnasgor
    depends_on:
      - db

volumes:
  db-data:
